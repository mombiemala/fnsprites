<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Track every Fortnite sprite & variant (Normal, Gold, Gummy, Galaxy, Gem, Holofoil, Rift). Save your collection, compare with friends, trade, and find the best Sprite-farming spots. Free & fan-made."
    />
    <meta name="theme-color" content="#0c0f1a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <!-- Social share preview (Open Graph + Twitter). Absolute URLs so crawlers resolve them. -->
    <meta property="og:site_name" content="FN Sprite Tracker" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://fnsprites.vercel.app/" />
    <meta property="og:title" content="FN Sprite Tracker — track every Fortnite sprite" />
    <meta
      property="og:description"
      content="Track every Fortnite sprite & variant — collect, compare, trade, and find the best Sprite-farming spots. Free & fan-made. Creator Code MOMBIE."
    />
    <meta property="og:image" content="https://fnsprites.vercel.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FN Sprite Tracker — track every Fortnite sprite" />
    <meta
      name="twitter:description"
      content="Collect, compare, trade & find the best Sprite-farming spots. Free & fan-made. Creator Code MOMBIE."
    />
    <meta name="twitter:image" content="https://fnsprites.vercel.app/og-image.png" />
    <link rel="canonical" href="https://fnsprites.vercel.app/" />
    <title>FN Sprite Tracker — track every Fortnite sprite &amp; variant</title>
    <!-- Structured data so search engines can build a rich result for the app. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "FN Sprite Tracker",
        "url": "https://fnsprites.vercel.app/",
        "applicationCategory": "GameApplication",
        "operatingSystem": "Web",
        "browserRequirements": "Requires JavaScript",
        "description": "Track every Fortnite sprite and variant (Normal, Gold, Gummy, Galaxy, Gem, Holofoil, Rift). Save your collection, compare with friends, trade, and find the best Sprite-farming spots. Free and fan-made.",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "isAccessibleForFree": true
      }
    </script>
    <!-- First-paint fallback: real, crawlable content shown instantly before the
         JS bundle mounts. React (createRoot) replaces #root on mount, so this is
         a progressive-enhancement placeholder, not hydrated markup. -->
    <style>
      #boot { min-height: 100vh; display: grid; place-items: center; background: #0c0f1a; color: #e8ecf8; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; text-align: center; padding: 24px; }
      #boot h1 { font-size: 2rem; font-weight: 800; margin: 0 0 8px; }
      #boot h1 b { color: #36c5ff; }
      #boot p { margin: 0; max-width: 34rem; color: #9aa4bf; font-size: .95rem; line-height: 1.5; }
      #boot .spin { margin-top: 20px; width: 26px; height: 26px; border: 3px solid #26304a; border-top-color: #36c5ff; border-radius: 50%; animation: bs .8s linear infinite; }
      @keyframes bs { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="boot">
        <div>
          <h1>FN <b>Sprite</b> Tracker</h1>
          <p>Track every Fortnite sprite &amp; variant — Normal, Gold, Gummy, Galaxy, Gem &amp; Holofoil. Save your collection, compare with friends, trade, and find the best sprite-farming spots. Free &amp; fan-made.</p>
          <div class="spin" role="status" aria-label="Loading"></div>
          <noscript><p style="margin-top:16px;color:#e8ecf8">This app needs JavaScript enabled to track your collection.</p></noscript>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
